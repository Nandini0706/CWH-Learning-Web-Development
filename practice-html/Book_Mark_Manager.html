<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Mark Manager - Nandini</title>
    <style>
        /* Google Font */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            min-height: 100vh;
            padding: 50px 20px;
            color: white;
        }

        /* Main Heading */
        h1 {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 40px;
            color: #38bdf8;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
        }

        /* Section Headings */
        h2 {
            margin-top: 30px;
            margin-bottom: 20px;
            color: #facc15;
            font-size: 1.7rem;
            border-left: 5px solid #38bdf8;
            padding-left: 12px;
        }

        /* Bookmark Container */
        p {
            margin: 15px 0;
        }

        /* Bookmark Links */
        a {
            display: block;
            width: 100%;
            max-width: 500px;
            text-decoration: none;
            color: white;
            padding: 15px 20px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            font-size: 1rem;
            font-weight: 500;
        }

        /* Hover Effect */
        a:hover {
            transform: translateX(10px) scale(1.02);
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.5);
        }

        /* Responsive */
        @media (max-width: 768px) {

            h1 {
                font-size: 2.2rem;
            }

            h2 {
                font-size: 1.4rem;
            }

            a {
                font-size: 0.95rem;
                padding: 13px 16px;
            }
        }
    </style>
</head>

<body>
    <h1>My BookMarks</h1>
    <h2>Primary Bookmarks</h2>
    <p><a target="_blank" href="https://www.google.com/">Open Google</a></p>
    <p><a target="_blank" href="https://www.youtube.com/">Open Youtube</a></p>
    <p><a target="_blank" href="https://www.facebook.com/">Open Facebook</a></p>
    <p><a target="_blank" href="https://www.stackoverflow.com/">Open StackOverFlow</a></p>
    <p><a target="_blank" href="https://www.quora.com/">Open Quora</a></p>
    <h2>Secondary Bookmarks</h2>
    <p><a target="_blank" href="https://www.yahoo.com/">Open Yahoo</a></p>
    <p><a target="_blank" href="https://www.mydramalist.com/">Open MyDramaList</a></p>
    <p><a target="_blank" href="https://www.makemytrip.com/">Open MakeMyTrip</a></p>

</body>

</html>
