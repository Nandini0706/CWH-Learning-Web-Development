<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MakeMyTrip</title>
    <style>
        /* Google Font */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        /* Main Form Container */
        form {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            padding: 35px;
            width: 100%;
            max-width: 550px;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
        }

        /* Heading */
        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #ffffff;
            font-size: 2.2rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* Form spacing */
        form div {
            margin-bottom: 18px;
        }

        /* Labels */
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #f8fafc;
        }

        /* Inputs */
        input,
        select {
            width: 100%;
            padding: 12px 15px;
            border: none;
            outline: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.18);
            color: white;
            font-size: 15px;
            transition: 0.3s ease;
            border: 1px solid transparent;
        }

        /* Placeholder */
        input::placeholder {
            color: #dbeafe;
        }

        /* Focus effect */
        input:focus,
        select:focus {
            border: 1px solid #93c5fd;
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 10px rgba(147, 197, 253, 0.5);
        }

        /* Select option color */
        select option {
            color: black;
        }

        /* Radio buttons section */
        b {
            display: block;
            margin-bottom: 10px;
            color: #ffffff;
        }

        input[type="radio"],
        input[type="checkbox"] {
            width: auto;
            margin-right: 6px;
        }

        /* Inline radio labels */
        input[type="radio"]+label {
            display: inline;
            margin-right: 18px;
        }

        /* Checkbox alignment */
        input[type="checkbox"] {
            margin-top: 5px;
        }

        /* Button */
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 5px 20px rgba(99, 102, 241, 0.4);
        }

        /* Button hover */
        button:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
        }

        /* Responsive */
        @media (max-width: 600px) {

            form {
                padding: 25px;
            }

            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>
    <div>
        <h1>Enter you Trip details</h1>
    </div>
    <hr>
    <form action="/submit.php">
        <div>

            <label for="name">Name</label>
            <input id="name" type="text" placeholder="Enter you full-name" required>
        </div>

        <div>
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter Your email" required>
        </div>

        <div>
            <label for="phone">Phone No.</label>
            <input type="tel" id="phone" placeholder="Phone Number" required>

        </div>

        <div>
            <label for="dest">Destination</label>
            <select id="dest">
                <option value="Select Destination" disabled selected>Select Destination</option>
                <option value="Delhi">Delhi</option>
                <option value="Mumbai">Mumbai</option>
                <option value="Banglore">Banglore</option>
                <option value="Hyderabad">Hyderabad</option>
            </select>
        </div>

        <div>
            <label for="dep_date">Departure Date</label>
            <input type="date" id="dep_date">
        </div>
        <div>
            <label for="ret_date">Return Date</label>
            <input type="date" id="ret_date">
        </div>

        <div>
            <label for="no_of_travelers">No. of Travelers</label>
            <input type="number" id="no_of_travelers">
        </div>
        <div>
            <b>Travel Type :- </b>
            <label for="air">By Air</label>
            <input type="radio" name="travel_type" id="air" value="air">
            <label for="road">By Road</label>
            <input type="radio" name="travel_type" id="road" value="road">
            <label for="train">By Train</label>
            <input type="radio" name="travel_type" id="train" value="train">
        </div>

        <div>
            <input type="checkbox" id="terms" required>
            <label for="terms">I agree to the terms and conditions</label>
        </div>
        <div>
            <button type="submit">Submit</button>
        </div>
    </form>
</body>

</html>
