<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadows</title>
    <style>
        nav ul li{
/* 
            list-style: inside ;
            border: 2px solid black;
            background-color: yellow; */
            list-style: none;
        }

        li{
            padding: 25px;
        }

        ul{

            
            display: flex;
        }


        .box {
            border: 2px solid black;
            box-shadow: 6px 8px 18px 1px;

        }

        p {
            text-shadow: 11px 10px 5px;
            outline: 2px solid red;
            outline-width: 3px;
            outline-offset: 3px;
        }
    </style>
</head>

<body>

    <nav>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </nav>
    <div class="box">
        I am a div in boc class
    </div>
    <p>
        Lorem ipsum dolor, sit amet consectetur adipisicing elit. Et adipisci laborum commodi architecto ad possimus
        doloribus repellendus dolores excepturi optio. Voluptates, repellendus at.
    </p>

</body>

</html>
