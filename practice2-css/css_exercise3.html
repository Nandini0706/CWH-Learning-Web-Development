<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desgin a card</title>
</head>

<style>
    * {
        margin: 0;
        padding: 0;



    }

    body{
        background-color: grey;
        padding: 35px;
    }

    .box {
        background-color: white;
        border: 3px solid rgb(214, 208, 208);
        height: auto;
        width: 337px;
        border-radius: 20px;
        margin: 20px;


    }

    img {
        width: 325px;
        padding: 5px;
        border-radius: 20px;
    }

    ul {
        list-style: none;
        display: flex;
    }

    li {

        padding: 2%;
        width: 70px;
        margin: 10px;
        color: rgb(149, 146, 146);
        border: 0.5px solid rgb(176, 176, 176);
        border-radius: 20px;
        text-align: center;
        font-weight: bold;
    }

    h2 {
        margin: 20px;
        font-family: Arial, Helvetica, sans-serif;
    }

    p {
        margin: 20px;
        text-align: justify;
        color: rgb(120, 118, 118);
    }


    button {
        margin-left: 98px;
        margin-bottom: 10px;
        width: 138px;
        text-align: center;
        font-weight: bolder;
        font-family: Arial, Helvetica, sans-serif;
        font-size: smaller;
        border: 1px solid white;
        color: rgb(44 136 219);
        background-color: rgb(150 208 227 / 41%);
        border-radius: 20px;
        padding: 15px;
        cursor: pointer;
    }

    button:hover{
        background-color: rgb(177, 203, 238);
        color: white;
    }
</style>

<body>
    <div class="box">
        <img src="https://i.pinimg.com/originals/9b/43/c0/9b43c053dd9c4e27b4bf73a798e6f5d3.jpg" alt="stray kids">
        <ul>
            <li>Music</li>
            <li>K-POP</li>
        </ul>
        <h2>Stray Kids</h2>
        <p>
            Stary Kids is a 8 membered boy band based in South korea.
            They debuted in 2018.
            The group consists of BangChan, LeeKnow, ChangBin, Hyunjin, Han Jisung, Felix, Seungmin, I.N.

        </p>
        <!-- <button>Read More</button> -->
        <div class="box2">
            <button>Read More</button>
        </div>
    </div>
</body>

</html>
