<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UltraEdit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        nav {
            position: sticky;
            top: 0;
            display: flex;
            border: 1px solid grey;
            margin: 10px 25px;
            background-color: rgb(237, 232, 232);
            border-radius: 5px;
            gap: 10px;
            align-items: center;
            

        }

        .start,
        .end,
        .centre{
            display: flex;
            list-style: none;
            padding: 5px;
            gap: 15px;
            align-items: center;
            flex-grow: 1;
            
        }

        
        .centre{
            justify-content: center;
            
        }
        .end{
            justify-content: flex-end;
        }

        

        button {
            background-color: rgb(255, 217, 2);
            padding: 10px;
            border-color: rgb(255, 217, 2);
            border-radius: 5px;
            width: 100px;
            
        }

        
    </style>
</head>

<body>
    <nav class="container">
        <ul class="start">

            <li><img class="logo" src="	https://www.ultraedit.com/wp-content/uploads/2023/01/UE-logo.svg" alt=""
                    height="50px"></li>
        </ul>

        <ul class="centre">
            <li>Product</li>
            <li>Buy</li>
            <li>Renew</li>
            <li>Support</li>
            <li>Learn</li>
            <li>Company</li>
        </ul>

        <ul class="end">


            <button>Download</button></li>
            <img class="img2" src="world.png" alt="" height="13px
                ">English</li>
            <img class="img3" src="search.png" alt="" height="13px">
        </ul>

    </nav>
</body>

</html>
